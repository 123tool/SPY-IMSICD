[modem]
port = /dev/ttyUSB0
baudrate = 115200
timeout = 2

[opencellid]
api_key = YOUR_OPENCELLID_API_KEY
enabled = true

[alert]
desktop_notify = true
telegram_bot_token = 
telegram_chat_id = 

[logging]
log_file = spy_imsicd.log
log_level = INFO
export_format = json

[detection]
signal_spike_threshold = 20   # dBm
neighbor_absence_threshold = -60  # RSSI in dBm
max_cell_change_per_minute = 3
